name: CI

on:
  push:
    branches: [main, "wallet-self-audit/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# No write permissions by default — least privilege.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      # Install + verify no third-party source builds. Our own editable
      # install (hatchling) is allowed; external deps must use wheels.
      - name: Install (locked) + verify no source builds
        run: |
          set -o pipefail
          uv sync --locked --all-extras 2>&1 | tee install.log
          # Filter out our own package's editable build line (allowed).
          if grep -E "Building (wheel|source distribution)" install.log \
             | grep -v "wallet-self-audit"; then
            echo "::error::A third-party package was built from source — wheel missing for this platform"
            exit 1
          fi

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy src

      - name: Type check (pyright strict)
        run: uv run pyright src

      - name: Security smells (bandit)
        run: uv run bandit -c pyproject.toml -r src/

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with output capture
        run: |
          set -o pipefail
          # Exclude @pytest.mark.lattice tests — pure-Python LLL on a
          # 35-dimension Boneh-Venkatesan basis takes ~5 minutes per
          # OS/Python combination. Run them locally with
          # ``pytest -m lattice`` or via a future nightly workflow.
          uv run pytest -ra -m "not lattice" 2>&1 | tee test_output.log

      # CRITICAL: sentinel leak gate. Combines test output + audit log,
      # greps for known test privkey fingerprint. Build fails on any hit.
      - name: Sentinel leak gate
        run: |
          touch leak_corpus.txt
          [ -f test_output.log ] && cat test_output.log >> leak_corpus.txt
          [ -f ~/.local/state/wsa/audit.jsonl ] && cat ~/.local/state/wsa/audit.jsonl >> leak_corpus.txt
          if grep -F -f tests/fixtures/sentinel.txt leak_corpus.txt; then
            echo "::error::Test private key sentinel leaked into output"
            exit 1
          fi
          echo "OK: no sentinel leak"

      # --skip-editable excludes our own project (it's not on PyPI yet).
      # Drop --strict because it treats the editable skip as a collection
      # failure even though we asked for it. Without --strict, pip-audit
      # still fails on any real CVE; that's what we want here.
      - name: Dependency audit (pip-audit, skip editable)
        run: uv run pip-audit --skip-editable
