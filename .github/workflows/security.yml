name: Security audit (weekly)

on:
  schedule:
    - cron: "37 4 * * 1"   # Monday 04:37 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # to file an issue if a CVE is found

jobs:
  pip-audit:
    name: pip-audit (CVE check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --locked --all-extras
      - name: Run pip-audit (strict, fail on any)
        run: uv run pip-audit --strict --desc

  gitleaks-full-history:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for historical leak detection
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"
